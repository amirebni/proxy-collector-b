name: Proxy Collector B

on:
  workflow_dispatch:
  schedule:
    - cron: "45 */3 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl jq coreutils

      - name: Fetch Registry
        run: |
          curl -s https://raw.githubusercontent.com/punez/proxy-registry/main/registry.json -o registry.json

      - name: Extract Shard Sources
        run: |
          jq -r '.shards["collector-b"][]' registry.json > sources.txt
          echo "Loaded sources:"
          cat sources.txt

      - name: Collect + Multi Decode
        run: |
          rm -f merged.txt
          touch merged.txt

          while read url; do
            [ -z "$url" ] && continue
            echo "Downloading $url"

            content=$(curl -L -s --max-time 20 "$url" || echo "")

            [ -z "$content" ] && continue

            echo "$content" >> merged.txt

            # Try base64 decode
            decoded=$(echo "$content" | base64 -d 2>/dev/null || echo "")
            if [ -n "$decoded" ]; then
              echo "$decoded" >> merged.txt
            fi

          done < sources.txt

      - name: Extract Valid Protocol Lines (Robust)
        run: |
          grep -aEo '(vmess|vless|trojan|ss|ssr|hy2|tuic)://[^"]+' merged.txt > extracted.txt || true

          sort -u extracted.txt -o extracted.txt
          head -n 5000 extracted.txt > limited.txt
          mv limited.txt extracted.txt

          echo "Total extracted:"
          wc -l extracted.txt

      - name: Commit Results
        run: |
          git config --global user.name "collector-b-bot"
          git config --global user.email "bot@github.com"
          git add extracted.txt
          git commit -m "update extracted list" || echo "No changes"
          git push || true
